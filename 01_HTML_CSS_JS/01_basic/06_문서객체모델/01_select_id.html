<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
    <script>
      // 웹페이지의 모든 콘텐츠 (HTML, CSS, Image)가 로드된 이후에 실행되는 이벤트 핸들러
      window.onload = function () {
        const header = document.getElementById('header'); //요소 선택
        header.style.color = 'orange';
        header.style.backgroundColor = 'red';
        // innerText는 <strong> 태그를 텍스트로 적용함
        header.innerText = 'From JS';
        // innerHTML는 <strong> 태그를 HTML 요소로 적용함
        // -> 브라우저에 보이는 텍스트 기준
        // CSS 랜더링(display:none)에 영향을 받음
        header.innerHTML = '<strong>From JS2</strong>';

        const box = document.getElementById('box'); //요소 선택
        // console.log(box.innerText);

        // textContent : 렌더링 영향 안 받음.
        // 데이터만 처리할 때는 주로 textContent만 사용
        console.log(box.textContent);
      };
    </script>
  </head>

  <body>
    <h1 id="header">Header</h1>
    <div id="box">
      hello
      <span style="display: none">World</span>
    </div>
  </body>
</html>
