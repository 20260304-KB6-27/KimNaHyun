<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      // document 객체는 웹 페이지 최상위 DOM 요소
      console.log(document);

      // HTML Collection
      // document에서 getElements~로 찾아온 요소들의 묶음
      // 유사 배열 (배열 메소드 사용불가)
      let li = document.getElementsByTagName('li');
      console.log(li);
      // 관례적으로 요소노드를 선택할 때 사용
      const $h1 = document.getElementById('header');

      $h1.style.color = 'red';
    </script>
  </head>

  <body>
    <h1 id="header">DOM 구조</h1>
    <div>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ipsam
        perspiciatis dolorem corporis blanditiis quo optio nulla voluptates
        minima iure corrupti. Doloribus fugit minus qui corporis inventore
        consequatur, laudantium ipsa! Expedita!
      </p>

      <ul>
        <li></li>
        <li></li>
        <li></li>
      </ul>
    </div>
  </body>
</html>
